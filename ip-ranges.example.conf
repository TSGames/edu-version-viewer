# IP range -> tag (network / organisation) for automatic endpoint tagging.
#
# On every refresh the app resolves each endpoint's host to an IPv4 address and
# attaches the tag of every matching range below. Copy this file to your
# DATA_DIR as `ip-ranges.conf` (or point IP_RANGES_FILE at it).
#
# One mapping per line:
#   <range>: <tag>
# <range> is either CIDR ("134.76.0.0/16") or an octet prefix
# ("134.76" => /16, "10" => /8, "192.168.1" => /24).
# Lines starting with # and blank lines are ignored.

134.76: GWDG
