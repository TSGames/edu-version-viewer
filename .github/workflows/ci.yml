name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Run tests
        run: node --test

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t edu-version-viewer:ci .
      - name: Smoke test container
        run: |
          docker run -d --name evv -p 3000:3000 \
            -e ADMIN_PASSWORD=ci-secret \
            -e CRON_SCHEDULE="*/15 * * * *" \
            edu-version-viewer:ci
          # Wait for the health endpoint.
          for i in $(seq 1 20); do
            if curl -fsS http://localhost:3000/api/health >/dev/null; then
              echo "container healthy"; break
            fi
            sleep 1
          done
          curl -fsS http://localhost:3000/api/health
          curl -fsS http://localhost:3000/api/endpoints
          docker rm -f evv
