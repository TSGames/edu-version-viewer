name: CI

on:
  push:
    branches: ["**"]
    # Also run on release tags so the publish jobs fire. Both v-prefixed and
    # bare semver tags are accepted (this environment creates bare tags).
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "[0-9]+.[0-9]+.[0-9]+"
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: node --test

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t edu-version-viewer:ci .
      - name: Smoke test container
        run: |
          docker run -d --name evv -p 3000:3000 \
            -e ADMIN_PASSWORD=ci-secret \
            -e CRON_SCHEDULE="*/15 * * * *" \
            edu-version-viewer:ci
          # Wait for the health endpoint.
          for i in $(seq 1 20); do
            if curl -fsS http://localhost:3000/api/health >/dev/null; then
              echo "container healthy"; break
            fi
            sleep 1
          done
          # Health is open; reading endpoints now requires authentication.
          curl -fsS http://localhost:3000/api/health
          test "$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3000/api/endpoints)" = "401"
          curl -fsS -u admin:ci-secret http://localhost:3000/api/endpoints
          docker rm -f evv

  publish:
    runs-on: ubuntu-latest
    needs: [test, docker]
    # Publish only on pushes to main and on semver tags, never on PRs.
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # Validate the Helm chart on every push/PR (lint + render variants). No push.
  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.16.3
      - name: Helm lint
        run: helm lint charts/edu-version-viewer
      - name: Helm template (defaults)
        run: helm template t charts/edu-version-viewer --set auth.adminPassword=ci > /dev/null
      - name: Helm template (all features on)
        run: |
          helm template t charts/edu-version-viewer \
            --set auth.adminPassword=ci \
            --set networkPolicy.enabled=true \
            --set ingress.enabled=true \
            --set persistence.enabled=true \
            --set autoscaling.enabled=true > /dev/null

  # Package and push the chart as an OCI artifact to GHCR. Versioning follows the
  # git ref: a semver tag (v1.2.3 or 1.2.3) publishes the matching version (and
  # pins the same image tag); main publishes a dev prerelease pinned to the
  # sha-<sha> image.
  helm-publish:
    runs-on: ubuntu-latest
    needs: [test, docker, helm-lint]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.16.3
      - name: Compute chart and app versions from the git ref
        id: ver
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            V="${GITHUB_REF_NAME#v}"
            echo "chart=$V" >> "$GITHUB_OUTPUT"
            echo "app=$V" >> "$GITHUB_OUTPUT"
          else
            SHORT="${GITHUB_SHA::7}"
            # Valid SemVer prerelease, sorts below any real release.
            echo "chart=0.0.0-dev.${SHORT}" >> "$GITHUB_OUTPUT"
            # Matches docker/metadata-action's type=sha image tag.
            echo "app=sha-${SHORT}" >> "$GITHUB_OUTPUT"
          fi
      - name: Log in to GHCR (Helm OCI)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Package and push chart
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          helm package charts/edu-version-viewer \
            --version "${{ steps.ver.outputs.chart }}" \
            --app-version "${{ steps.ver.outputs.app }}"
          helm push "edu-version-viewer-${{ steps.ver.outputs.chart }}.tgz" \
            "oci://ghcr.io/${OWNER}/charts"
