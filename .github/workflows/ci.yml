name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Run tests
        run: node --test

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t edu-version-viewer:ci .
      - name: Smoke test container
        run: |
          docker run -d --name evv -p 3000:3000 \
            -e ADMIN_PASSWORD=ci-secret \
            -e CRON_SCHEDULE="*/15 * * * *" \
            edu-version-viewer:ci
          # Wait for the health endpoint.
          for i in $(seq 1 20); do
            if curl -fsS http://localhost:3000/api/health >/dev/null; then
              echo "container healthy"; break
            fi
            sleep 1
          done
          # Health is open; reading endpoints now requires authentication.
          curl -fsS http://localhost:3000/api/health
          test "$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3000/api/endpoints)" = "401"
          curl -fsS -u admin:ci-secret http://localhost:3000/api/endpoints
          docker rm -f evv

  publish:
    runs-on: ubuntu-latest
    needs: [test, docker]
    # Publish only on pushes to main and on version tags (v*), never on PRs.
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
