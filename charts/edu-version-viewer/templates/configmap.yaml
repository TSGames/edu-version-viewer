apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "edu-version-viewer.fullname" . }}
  labels:
    {{- include "edu-version-viewer.labels" . | nindent 4 }}
data:
  PORT: {{ .Values.config.port | quote }}
  ADMIN_USER: {{ .Values.config.adminUser | quote }}
  VIEWER_USER: {{ .Values.config.viewerUser | quote }}
  CRON_SCHEDULE: {{ .Values.config.cronSchedule | quote }}
  DATA_DIR: {{ .Values.config.dataDir | quote }}
  REQUEST_TIMEOUT_MS: {{ .Values.config.requestTimeoutMs | quote }}
  FAIL_THRESHOLD: {{ .Values.config.failThreshold | quote }}
  SESSION_TTL_SECONDS: {{ .Values.config.sessionTtlSeconds | quote }}
