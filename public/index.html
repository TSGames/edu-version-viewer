<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>edu-sharing Version Viewer</title>
    <link rel="stylesheet" href="/style.css" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📦</text></svg>"
    />
  </head>
  <body>
    <div id="login" class="login hidden">
      <form id="login-form" class="login-box">
        <h2>Anmelden</h2>
        <label class="edit-field"
          >Benutzer
          <input id="login-user" type="text" autocomplete="username" />
        </label>
        <label class="edit-field"
          >Passwort
          <input id="login-pass" type="password" autocomplete="current-password" />
        </label>
        <button type="submit">Anmelden</button>
        <div id="login-msg" class="error-text"></div>
      </form>
    </div>

    <header>
      <h1>edu-sharing Version Viewer</h1>
      <div class="header-actions">
        <span id="cron-info" class="muted"></span>
        <span id="whoami" class="muted"></span>
        <button id="logout-btn" type="button" class="secondary hidden">Abmelden</button>
      </div>
    </header>

    <section id="admin-panel" class="panel hidden">
      <div class="row">
        <input
          id="new-url"
          type="text"
          placeholder="z. B. stable.demo.edu-sharing.net  oder  vollständige _about-URL"
        />
        <input id="new-label" type="text" placeholder="Label (optional)" />
        <button id="add-btn" type="button">Hinzufügen</button>
      </div>
      <div class="row">
        <button id="refresh-all-btn" type="button">Alle aktualisieren</button>
        <span id="admin-msg" class="muted"></span>
      </div>
    </section>

    <div class="toolbar">
      <label for="sort-by" class="muted">Sortieren nach</label>
      <select id="sort-by">
        <option value="label">Label</option>
        <option value="url">URL</option>
        <option value="status">Status</option>
        <option value="version">Version</option>
      </select>
      <span class="toolbar-spacer"></span>
      <span class="muted">Ansicht</span>
      <div id="view-toggle" class="view-toggle" role="group" aria-label="Ansicht">
        <button type="button" data-view="cards" class="active">Karten</button>
        <button type="button" data-view="list">Liste</button>
      </div>
    </div>

    <main id="cards"></main>

    <script src="/app.js"></script>
  </body>
</html>
